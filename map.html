<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beyond Yangon</title>

  <link rel="icon" href="./assets/icons/myanmar.svg" type="image/svg+xml">
  <script src="https://unpkg.com/maplibre-gl@^5.24.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@^5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/base.css">
</head>

<body>
  <header>
    <div id="navbar-placeholder"></div>
  </header>

  <div class="divider-block" style="height: 100px;"></div>

  <main>
    <div id="map"></div>

    <div id="usage-guide">
      <ul>
        <li>Explore regional landmarks by selecting a state.</li>
        <li>Interact with markers to view detailed location insights.</li>
        <li>Use back button to go back to original state.</li>
      </ul>
    </div>

    <div id="state-region-placeholder"></div>

    <button id="back-btn">
      &leftarrow; Back
    </button>

    <div id="place-info">
      <button id="close-info">&times;</button>
      <h3 id="place-name"></h3>
      <div id="place-type"></div>
      <img id="place-img" src="">
      <p id="place-coords"></p>
    </div>
  </main>

  <footer>
    <div id="footer-placeholder"></div>
  </footer>

  <script src="./js/main.js"></script>
  <script type="module" src="./js/map.js"></script>


</body>

</html>
